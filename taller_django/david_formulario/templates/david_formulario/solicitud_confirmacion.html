<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud enviada</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Trebuchet MS', Verdana, sans-serif;
            background: radial-gradient(circle at top, #f5fffb 0%, #d8efe4 100%);
            color: #183228;
        }
        .card {
            width: min(560px, 100%);
            background: rgba(251, 255, 252, 0.96);
            padding: 32px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(20, 66, 52, 0.14);
        }
        a {
            display: inline-block;
            margin-top: 16px;
            color: #166a52;
            text-decoration: none;
            font-weight: 700;
        }
        .actions {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>Solicitud enviada con éxito</h1>
        <p>La información fue almacenada correctamente.</p>
        <div class="actions">
            <a href="{% url 'david_formulario:solicitud_registro' %}">Enviar otra solicitud</a>
            <a href="{% url 'inicio' %}">Volver al inicio</a>
        </div>
    </section>
</body>
</html>
