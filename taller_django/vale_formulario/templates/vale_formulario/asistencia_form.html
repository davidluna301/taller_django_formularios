<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de asistencia</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5efe6;
            --panel: #fffaf4;
            --text: #2c241d;
            --accent: #a44a3f;
            --accent-dark: #7d332b;
            --border: #dcc7b5;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: linear-gradient(160deg, #f6efe7 0%, #efe4d6 100%);
            color: var(--text);
        }
        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }
        .card {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 45px rgba(82, 46, 28, 0.12);
        }
        h1 { margin-top: 0; font-size: 2rem; }
        p { line-height: 1.5; }
        form p { margin: 0 0 14px; }
        label { display: block; font-weight: 700; margin-bottom: 6px; }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fff;
            font: inherit;
        }
        input[type='checkbox'] {
            width: auto;
            margin-right: 8px;
        }
        button {
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            padding: 12px 20px;
            font: inherit;
            cursor: pointer;
        }
        button:hover { background: var(--accent-dark); }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .link-button {
            display: inline-block;
            border-radius: 999px;
            border: 1px solid var(--border);
            padding: 11px 18px;
            text-decoration: none;
            color: var(--text);
            background: transparent;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Registro de asistencia</h1>
            <p>Completa el formulario para guardar la asistencia en la base de datos.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="actions">
                    <button type="submit">Guardar asistencia</button>
                    <a class="link-button" href="{% url 'inicio' %}">Volver al inicio</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
