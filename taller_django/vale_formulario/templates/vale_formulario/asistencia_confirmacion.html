<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia registrada</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, 'Times New Roman', serif;
            background: radial-gradient(circle at top, #fff6eb 0%, #ecd7c4 100%);
            color: #35291f;
        }
        .card {
            width: min(560px, 100%);
            background: rgba(255, 251, 245, 0.95);
            padding: 32px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(90, 52, 30, 0.16);
        }
        a {
            display: inline-block;
            margin-top: 16px;
            color: #8b3e32;
            text-decoration: none;
            font-weight: 700;
        }
        .actions {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>Asistencia registrada con éxito</h1>
        <p>El registro fue almacenado correctamente.</p>
        <div class="actions">
            <a href="{% url 'vale_formulario:asistencia_registro' %}">Registrar otra asistencia</a>
            <a href="{% url 'inicio' %}">Volver al inicio</a>
        </div>
    </section>
</body>
</html>
